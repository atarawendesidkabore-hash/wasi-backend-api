name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: "sqlite:///./test.db"
      SECRET_KEY: "ci-test-secret-key-minimum-thirty-two-characters-long"
      DEBUG: "true"
      LIGHT_STARTUP: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest-cov pip-audit

      - name: Lint with ruff
        run: ruff check src/ tests/ --output-format=github

      - name: Run tests with coverage
        run: pytest tests/ -v --tb=short --cov=src --cov-report=term-missing --cov-fail-under=60

      - name: Audit dependencies for vulnerabilities
        run: pip-audit --strict --desc on
        continue-on-error: true

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Scan for secrets
        run: |
          pip install detect-secrets
          detect-secrets scan --all-files --exclude-files '\.git/.*' --exclude-files 'venv/.*' --exclude-files '.*\.pyc' > .secrets-baseline.json
          detect-secrets audit --report --json .secrets-baseline.json || true
