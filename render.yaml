databases:
  - name: wasi-db
    plan: free
    databaseName: wasi
    user: wasi_user

services:
  - type: web
    name: wasi-backend-api
    runtime: python
    plan: free
    repo: https://github.com/atarawendesidkabore-hash/wasi-backend-api
    buildCommand: pip install -r requirements.txt
    preDeployCommand: alembic upgrade head
    startCommand: gunicorn src.main:app --workers 1 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 300
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: wasi-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        value: '["https://wasi-frontend.onrender.com","http://localhost:3000"]'
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: LIGHT_STARTUP
        value: "false"
      - key: SCHEDULER_ENABLED
        value: "true"
      - key: ANTHROPIC_API_KEY
        sync: false  # set manually in Render dashboard (secret)
      - key: ACLED_API_KEY
        sync: false  # optional: set in Render dashboard for conflict data
      - key: ACLED_EMAIL
        sync: false  # optional: email used for ACLED registration
      - key: COMTRADE_API_KEY
        sync: false  # optional: UN Comtrade subscription key
      - key: SKIP_SCRAPERS
        value: "false"  # bootstrap will run all scrapers on next deploy

  - type: web
    name: wasi-frontend
    runtime: static
    plan: free
    repo: https://github.com/atarawendesidkabore-hash/wasi-frontend
    buildCommand: echo "Static site - no build needed"
    staticPublishPath: .
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
